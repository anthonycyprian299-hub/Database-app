<!DOCTYPE html>
<html>
<head>
  <title>SchoolVault Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #020617;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 10px;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat-card {
      flex: 1;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-card h2 {
      margin: 5px 0;
      font-size: 18px;
    }

    .stat-card p {
      font-size: 12px;
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border-left: 5px solid gray;
    }

    .matched {
      border-left-color: #22c55e;
    }

    .unmatched {
      border-left-color: #ef4444;
    }

    .amount {
      font-size: 18px;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }

    .status {
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  📊 SchoolVault
</header>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <p>Total Revenue</p>
      <h2 id="total">₦0</h2>
    </div>

    <div class="stat-card">
      <p>Transactions</p>
      <h2 id="count">0</h2>
    </div>
  </div>

  <button onclick="loadData()">🔄 Refresh</button>

  <div id="data"></div>

</div>

<script>
async function loadData() {
  const res = await fetch('/transactions');
  const data = await res.json();

  const container = document.getElementById('data');
  container.innerHTML = "";

  let total = 0;

  data.forEach(tx => {
    total += tx.amount;

    const div = document.createElement('div');
    div.className = "card " + (tx.status === "matched" ? "matched" : "unmatched");

    div.innerHTML = `
      <div class="amount">₦${tx.amount}</div>
      <div>${tx.sender_name || "Unknown"}</div>
      <div class="small">${tx.narration}</div>
      <div class="small">${new Date(tx.transaction_time).toLocaleString()}</div>
      <div class="status">Status: ${tx.status}</div>
    `;

    container.appendChild(div);
  });

  document.getElementById('total').innerText = "₦" + total;
  document.getElementById('count').innerText = data.length;
}

// Auto refresh every 10 seconds
setInterval(loadData, 10000);

loadData();
</script>

</body>
</html>
